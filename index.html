<head>
    <meta charset="UTF-8">

    <title>Reglamentos y Políticas</title>

    <style>
       body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #f4f6f8;
        position: relative;
        }

        body::before {
        content: "";
        position: fixed;
        top: 50%;
        left: 50%;
        width: 400px;
        height: 200px;
        background-image: url('Logo_MetalCon.png');
        background-repeat: no-repeat;
        background-size: contain;
        opacity: 0.07;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
        }

        h1 {
            text-align: center;
            font-size: 24px;
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #ccc;
            padding-bottom: 5px;
            margin-top: 30px;
        }

        .contenedor {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .documento {
            background: #ffffff;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }

        .documento h3 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        a {
            display: inline-block;
            text-decoration: none;
            color: white;
            background-color: #3498db;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        a:hover {
            background-color: #2980b9;
        }

        /* 📱 Responsive para celulares */
        @media (max-width: 480px) {
            body {
                margin: 10px;
            }

            h1 {
                font-size: 20px;
            }

            .documento h3 {
                font-size: 14px;
            }

            a {
                width: 100%;
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
